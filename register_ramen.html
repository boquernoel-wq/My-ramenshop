<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Ramen Shop</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffaf87;
            color: #ffaf87; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }


        .portal-bg-wrapper {
            flex: 1;
            background-image: linear-gradient(rgba(43, 30, 22, 0.65), rgba(43, 30, 22, 0.8)), url('RAMENSHOP.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .register-card-layout {
            background-color: rgba(255, 255, 255, 0.94) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 138, 76, 0.3) !important;
            max-width: 680px;
            width: 100%;
        }

        .btn-red {
            background-color: #db3a34;
            color: #ffffff;
            border: none;
            transition: background-color 0.2s ease;
        }

        .btn-red:hover {
            background-color: #db3a34;
            color: #ffffff;
        }

        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-select ~ label {
            color: #db3a34 !important;
        }

        .form-control:focus, .form-select:focus {
            border-color: #db3a34 !important;
            box-shadow: #db3a34!important;
        }

        .form-check-input:checked {
            background-color: #db3a34 !important;
            border-color: #db3a34 !important;
        }

        @media (max-width: 640px) {
            .custom-navbar {
                background-color: rgba(43, 30, 22, 0.98) !important;
                padding: 0.5rem 0;
            }
            .custom-navbar .nav-link {
                padding: 8px 12px !important;
                border-radius: 4px;
            }
            .portal-bg-wrapper {
                padding: 1.5rem 0.5rem;
            }
        }
    </style>
</head>
<body>


<div class="portal-bg-wrapper">
    <div class="card register-card-layout rounded-3 shadow-lg p-3 p-md-4">
        <div class="card-body">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold h4 text-dark mb-1">Create Membership Account</h2>
                <p class="small text-secondary mb-0">Register your credentials down below to start pre-ordering menu profiles.</p>
            </div>

            <form action="#" method="POST" onsubmit="event.preventDefault();">
                
                <div class="row g-3">
                    
                    <div class="col-12 col-md-8">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="floatingFullName" placeholder="Juan Dela Cruz" required>
                            <label for="floatingFullName">Full Name</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <div class="form-floating">
                            <input type="tel" class="form-control" id="floatingPhone" placeholder="09123456789" pattern="[0-9]{11}" title="Phone number must be exactly 11 numeric digits" required>
                            <label for="floatingPhone">Phone Number</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="floatingRegisterEmail" placeholder="name@example.com" required>
                            <label for="floatingRegisterEmail">Email Address</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="form-floating">
                            <select class="form-select" id="floatingPaymentSelect" aria-label="Preferred Payment Method" required>
                                <option value="" disabled selected>Choose your payment method...</option>
                                <option value="GCash">GCash</option>
                                <option value="Maya">Maya</option>
                                <option value="COD">Cash on Delivery (COD)</option>
                                <option value="Card">Credit / Debit Card</option>
                            </select>
                            <label for="floatingPaymentSelect">Preferred Payment</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="floatingRegisterPassword" placeholder="Password" required>
                            <label for="floatingRegisterPassword">Password</label>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Confirm Password" required>
                            <label for="floatingConfirmPassword">Confirm Password</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsAgreementCheckbox" required>
                            <label class="form-check-label small text-secondary" for="termsAgreementCheckbox">
                                I verify that all data inputs match my official personal details accurately.
                            </label>
                        </div>
                    </div>

                </div>

                <button type="submit" class="btn btn-red w-100 fw-bold py-2 mt-4 mb-3 shadow-sm">
                    Register Profile Account
                </button>

                <hr class="text-black-50 my-3">

                <div class="row g-2">
                    <div class="col-12 col-md-6 text-center text-md-start">
                        <p class="small text-secondary mb-0 py-2">Existing account profile? <a href="login_ramen.html" class="fw-bold text-decoration-none" style="color: #db3a34;">Login here</a></p>
                    </div>
                    <div class="col-12 col-md-6 text-center text-md-end">
                        <a href="index.html" class="btn btn-outline-dark btn-sm px-4 fw-bold py-2 shadow-sm">
                            Back to Home
                        </a>
                    </div>
                </div>

            </form>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
